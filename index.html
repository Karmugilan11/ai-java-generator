<!DOCTYPE html>

<html>
<head>
<title>AI Java Generator</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f7fb;
    margin:0;
}

#container{
    max-width:900px;
    margin:auto;
    height:100vh;
    display:flex;
    flex-direction:column;
}

#chat{
    flex:1;
    overflow-y:auto;
    padding:20px;
}

.message{
    padding:12px 16px;
    margin:10px 0;
    border-radius:10px;
    max-width:70%;
}

.user{
    background:#4f8cff;
    color:white;
    margin-left:auto;
}

.ai{
    background:white;
    border:1px solid #ddd;
}

#inputBox{
    display:flex;
    padding:15px;
    background:white;
    border-top:1px solid #ddd;
}

#prompt{
    flex:1;
    padding:12px;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    margin-left:10px;
    padding:12px 18px;
    border:none;
    background:#4f8cff;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

footer{
    text-align:center;
    font-size:11px;
    color:#777;
    padding:5px;
}
</style>

</head>

<body>

<div id="container">

<div id="chat"></div>

<div id="inputBox">
<input id="prompt" placeholder="Ask AI to generate Spring Boot code..."/>
<button onclick="send()">Send</button>
</div>

<footer>
Created by Karmugilan ST
</footer>

</div>

<script>

async function send(){

    const prompt = document.getElementById("prompt").value;
    if(!prompt) return;

    const chat = document.getElementById("chat");

    const userMsg = document.createElement("div");
    userMsg.className="message user";
    userMsg.innerText=prompt;
    chat.appendChild(userMsg);

    document.getElementById("prompt").value="";

    const res = await fetch(
      "https://ai-java-generator.onrender.com/generate?prompt="+encodeURIComponent(prompt)
    );

    const data = await res.json();

    const aiMsg = document.createElement("div");
    aiMsg.className="message ai";
    aiMsg.innerText = data.response || JSON.stringify(data);
    chat.appendChild(aiMsg);

    chat.scrollTop = chat.scrollHeight;
}

</script>

</body>
</html>
