<!DOCTYPE html>
<html>

<head>
<title>AI Java Assistant</title>

<style>

body{
background:#0f172a;
color:#e2e8f0;
font-family:monospace;
margin:0;
}

#container{
max-width:1000px;
margin:auto;
height:100vh;
display:flex;
flex-direction:column;
}

header{
padding:15px;
font-size:18px;
border-bottom:1px solid #334155;
text-align:center;
}

#chat{
flex:1;
overflow-y:auto;
padding:20px;
}

.message{
padding:14px;
margin:12px 0;
border-radius:8px;
max-width:75%;
white-space:pre-wrap;
line-height:1.5;
}

.user{
background:#2563eb;
margin-left:auto;
}

.ai{
background:#1e293b;
border:1px solid #334155;
}

#inputBox{
display:flex;
padding:15px;
border-top:1px solid #334155;
background:#020617;
}

#prompt{
flex:1;
padding:12px;
border-radius:6px;
border:1px solid #334155;
background:#020617;
color:white;
}

button{
margin-left:10px;
padding:12px 18px;
border:none;
background:#22c55e;
color:black;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#16a34a;
}

pre{
background:#020617;
padding:15px;
border-radius:6px;
overflow:auto;
border:1px solid #334155;
}

.copy{
background:#334155;
color:white;
padding:5px 10px;
font-size:12px;
border-radius:4px;
cursor:pointer;
margin-top:6px;
display:inline-block;
}

footer{
text-align:center;
font-size:11px;
padding:6px;
color:#64748b;
}

</style>
</head>

<body>

<div id="container">

<header>
AI Spring Boot Developer Assistant
</header>

<div id="chat"></div>

<div id="inputBox">
<input id="prompt" placeholder="Ask about Spring Boot, Java, or paste code..."/>
<button onclick="send()">Send</button>
<button onclick="resetChat()">Reset</button>
</div>

<footer>
Created by Karmugilan ST
</footer>

</div>

<script>

const chat = document.getElementById("chat");

let session_id = localStorage.getItem("ai_session_id");

if(!session_id){
    session_id = crypto.randomUUID();
    localStorage.setItem("ai_session_id",session_id);
}

function addMessage(text,type){

const msg = document.createElement("div");
msg.className="message "+type;
msg.innerText=text;

chat.appendChild(msg);
chat.scrollTop = chat.scrollHeight;

return msg;
}

async function send(){

const input = document.getElementById("prompt");
const text = input.value;

if(!text) return;

addMessage(text,"user");

input.value="";

const loading = addMessage("AI thinking...","ai");

try{

const res = await fetch("/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
session_id:session_id,
message:text
})
});

const data = await res.json();

loading.remove();

if(data.reply){

const msg = document.createElement("div");
msg.className="message ai";

msg.innerHTML = formatCode(data.reply);

chat.appendChild(msg);

}else{

addMessage("Error generating response","ai");

}

}catch(e){

loading.remove();
addMessage("Server error","ai");

}

}

function formatCode(text){

const codeRegex = /```([\s\S]*?)```/g;

return text.replace(codeRegex,function(match,code){

return `<pre>${code}</pre><div class="copy" onclick="copyCode(this)">Copy</div>`;

});

}

function copyCode(el){

const code = el.previousElementSibling.innerText;

navigator.clipboard.writeText(code);

el.innerText="Copied";

setTimeout(()=>el.innerText="Copy",1500);

}

async function resetChat(){

await fetch("/reset",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
session_id:session_id
})
});

chat.innerHTML="";

}

document.getElementById("prompt").addEventListener("keypress",function(e){
if(e.key==="Enter"){
send();
}
});

</script>

</body>
</html>
